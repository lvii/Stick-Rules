ipv6: false
http_port: 3080
socks_port: 3090
allow_external_connections: true
vif_only: true
block_quic: true
hide_vpn_icon: false
geoip_db_url: https://github.com/xream/geoip/releases/latest/download/ipinfo.country.mmdb
asn_db_url: https://github.com/P3TERX/GeoLite.mmdb/raw/download/GeoLite2-ASN.mmdb
proxy_latency_test_url: https://1.1.1.1/generate_204
direct_latency_test_url: https://www.baidu.com
compat_route: true
include_all_networks: false
dns:
  upstreams:
    Global DNS:
    - quic://223.5.5.5:853
    - quic://223.6.6.6:853
    - https://223.5.5.5/dns-query
    - https://223.6.6.6/dns-query
    - https://dns.alidns.com/dns-query
    - https://dns.google/dns-query
    - https://dns.cloudflare.com/dns-query
    国外DNS:
    - https://doh.sb/dns-query
    - https://dns.google/dns-query
    - https://dns.quad9.net/dns-query
    - https://dns.adguard.com/dns-query
    - https://cloudflare-dns.com/dns-query
    BLOCK DNS:
    - tls://dns.nextdns.io/c761db
    - tls://dns.adguard-dns.com
    - https://dns.nextdns.io/c761db
    - https://dns.adguard.com/dns-query
    - quic://223.5.5.5:853
    - quic://223.6.6.6:853
    - https://doh.pub/dns-query
  forward:
  - domain_wildcard:
      match: '*'
      value: Global DNS
      disabled: false
  - domain_wildcard:
      match: '*'
      value: 国外DNS
      disabled: true
  - domain_wildcard:
      match: '*'
      value: BLOCK DNS
      disabled: true
